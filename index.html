<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Capture</title>
    <meta name="description" content="Receba conteúdo exclusivo">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        .subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover { background: #2563eb; }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .msg.success { background: #dcfce7; color: #166534; display: block; }
        .msg.error { background: #fef2f2; color: #991b1b; display: block; }
        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Conteúdo Exclusivo</h1>
        <p class="subtitle">Preencha abaixo para receber o material gratuito no seu e-mail.</p>

        <form id="leadForm">
            <input type="text" name="_honey" style="display:none">
            <input type="hidden" name="_captcha" value="true">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>
            <button type="submit" id="btnSubmit">Quero Receber</button>
        </form>

        <div id="msg" class="msg"></div>
        <footer>Seus dados estão seguros.</footer>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const msg = document.getElementById('msg');
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            msg.className = 'msg';

            try {
                const formData = new FormData(e.target);
                const data = new URLSearchParams();
                for (const [key, val] of formData) data.append(key, val);
                data.append('_subject', 'Novo Lead Capturado!');

                const res = await fetch('https://formsubmit.co/ajax/fercamitv@gmail.com', {
                    method: 'POST',
                    body: data
                });

                if (!res.ok) throw new Error('Erro no servidor');

                msg.className = 'msg success';
                msg.textContent = 'Pronto! Verifique seu e-mail.';
                e.target.reset();
            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = 'Erro ao enviar. Tente novamente.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Quero Receber';
            }
        });
    </script>
</body>
</html>
